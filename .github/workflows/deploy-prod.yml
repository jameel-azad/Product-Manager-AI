name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'deploy' to confirm production deployment"
        required: true

jobs:
  validate-input:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirmation
        if: ${{ github.event.inputs.confirm != 'deploy' }}
        run: |
          echo "Production deployment requires typing 'deploy' in the confirmation field."
          exit 1

  deploy-prod:
    name: Deploy to Production (Blue-Green)
    runs-on: ubuntu-latest
    environment: production
    needs: [validate-input]
    if: always() && (needs.validate-input.result == 'success' || github.event_name == 'push')
    concurrency:
      group: prod-deploy
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG_PROD }}

      - name: Deploy canary (10% traffic) — high-risk services
        run: |
          SHA=${{ github.sha }}
          # MEE and AI Orchestration use canary releases
          for service in mee-service ai-orchestration-service; do
            kubectl set image deployment/${service}-canary \
              $service=ghcr.io/${{ github.repository }}/$service:sha-${SHA:0:7} \
              -n platform
            kubectl rollout status deployment/${service}-canary -n platform --timeout=5m
          done

      - name: Wait 5 minutes — monitor error rates
        run: sleep 300

      - name: Check error rate — abort if >1%
        run: |
          # Query Prometheus for error rate on canary pods
          ERROR_RATE=$(curl -s "${{ secrets.PROMETHEUS_URL }}/api/v1/query" \
            --data 'query=rate(http_requests_total{job="mee-service-canary",status=~"5.."}[5m]) / rate(http_requests_total{job="mee-service-canary"}[5m])' \
            | python3 -c "import sys,json; r=json.load(sys.stdin)['data']['result']; v=float(r[0]['value'][1]) if r else 0; sys.exit(1 if v > 0.01 else 0)")

      - name: Promote canary to full rollout
        run: |
          SHA=${{ github.sha }}
          for service in auth-service project-service requirement-service design-service \
              ai-orchestration-service test-management-service devops-service mee-service \
              analytics-service notification-service agent-developer-service \
              legacy-conversion-service business-extraction-service; do
            kubectl set image deployment/$service \
              $service=ghcr.io/${{ github.repository }}/$service:sha-${SHA:0:7} \
              -n platform
            kubectl rollout status deployment/$service -n platform --timeout=5m
          done

      - name: Auto-rollback on failure
        if: failure()
        run: |
          echo "Deployment failed — rolling back all services"
          for service in auth-service project-service requirement-service design-service \
              ai-orchestration-service test-management-service devops-service mee-service \
              analytics-service notification-service agent-developer-service \
              legacy-conversion-service business-extraction-service; do
            kubectl rollout undo deployment/$service -n platform
          done

      - name: Notify on outcome
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {"text": "${{ job.status == 'success' && '✅ Production deploy succeeded' || '❌ Production deploy FAILED — auto-rollback triggered' }} — ${{ github.sha }}"}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
