openapi: "3.1.0"
info:
  title: Project & Backlog Service API
  description: |
    Manages projects, product backlogs, sprints, and AI-assisted planning.
    SRS requirements covered: PLN-001, PLN-002, PLN-003, PLN-004, PLN-005, PLN-006
  version: "1.0.0"

servers:
  - url: http://localhost:8002/api/v1

tags:
  - name: projects
  - name: backlog
  - name: sprints
  - name: traceability

paths:

  /projects:
    get:
      tags: [projects]
      summary: List projects for tenant
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - in: query
          name: status
          schema:
            type: string
            enum: [active, paused, completed, archived]
      responses:
        "200":
          description: Paginated project list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectListResponse'
    post:
      tags: [projects]
      summary: Create a new project
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'

  /projects/{project_id}:
    get:
      tags: [projects]
      summary: Get project by ID
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        "200":
          description: Project detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
    put:
      tags: [projects]
      summary: Update project
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectRequest'
      responses:
        "200":
          description: Updated project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
    delete:
      tags: [projects]
      summary: Archive project
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        "204":
          description: Archived

  # ── Backlog ──────────────────────────────────────────────────────────────

  /projects/{project_id}/backlog:
    get:
      tags: [backlog]
      summary: Get project backlog items
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - in: query
          name: sprint_id
          schema:
            type: string
            format: uuid
        - in: query
          name: priority
          schema:
            type: string
            enum: [critical, high, medium, low]
      responses:
        "200":
          description: Backlog items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BacklogItem'

  /projects/{project_id}/backlog/generate:
    post:
      tags: [backlog]
      summary: "PLN-002: AI-generate a prioritized product backlog from requirements"
      description: Triggers the AI Planning Engine to generate user stories with acceptance criteria and effort estimates from the project's approved requirements.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                requirement_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
                  description: Subset of requirements to use; defaults to all approved requirements
                sprint_capacity:
                  type: integer
                  description: Story points capacity per sprint
      responses:
        "202":
          description: Backlog generation job queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIJobReference'

  /projects/{project_id}/backlog/items:
    post:
      tags: [backlog]
      summary: Manually add a backlog item
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBacklogItemRequest'
      responses:
        "201":
          description: Backlog item created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BacklogItem'

  /projects/{project_id}/backlog/items/{item_id}:
    put:
      tags: [backlog]
      summary: Update backlog item
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - name: item_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBacklogItemRequest'
      responses:
        "200":
          description: Updated item
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BacklogItem'

  /projects/{project_id}/backlog/estimate:
    post:
      tags: [backlog]
      summary: "PLN-006: AI effort estimation for backlog items"
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [item_ids]
              properties:
                item_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
      responses:
        "200":
          description: Estimation results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EstimationResult'

  # ── Sprints ──────────────────────────────────────────────────────────────

  /projects/{project_id}/sprints:
    get:
      tags: [sprints]
      summary: List sprints for a project
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        "200":
          description: Sprint list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Sprint'
    post:
      tags: [sprints]
      summary: Create a sprint
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSprintRequest'
      responses:
        "201":
          description: Sprint created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Sprint'

  /projects/{project_id}/sprints/plan:
    post:
      tags: [sprints]
      summary: "PLN-003: AI-recommended sprint plan based on velocity and capacity"
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sprint_duration_weeks:
                  type: integer
                  default: 2
                team_capacity_points:
                  type: integer
                include_backlog_item_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
      responses:
        "200":
          description: Recommended sprint plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SprintPlanRecommendation'

  /projects/{project_id}/sprints/{sprint_id}:
    get:
      tags: [sprints]
      summary: Get sprint detail
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/SprintId'
      responses:
        "200":
          description: Sprint detail with items
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SprintDetail'
    put:
      tags: [sprints]
      summary: Update sprint
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/SprintId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSprintRequest'
      responses:
        "200":
          description: Updated sprint

  # ── Traceability ─────────────────────────────────────────────────────────

  /projects/{project_id}/traceability:
    get:
      tags: [traceability]
      summary: "PLN-004: Requirement traceability matrix for a project"
      description: Returns full req → design → code artifact → test → deployment linkage.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - in: query
          name: requirement_id
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Traceability matrix
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TraceabilityEntry'

components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    ProjectId:
      name: project_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SprintId:
      name: sprint_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Page:
      name: page
      in: query
      schema:
        type: integer
        default: 1
    PageSize:
      name: page_size
      in: query
      schema:
        type: integer
        default: 20

  schemas:
    Project:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [active, paused, completed, archived]
        tech_stack:
          type: array
          items:
            type: string
        repository_url:
          type: string
        owner_id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateProjectRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        tech_stack:
          type: array
          items:
            type: string
        repository_url:
          type: string

    UpdateProjectRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        status:
          type: string
        tech_stack:
          type: array
          items:
            type: string

    ProjectListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Project'
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer

    BacklogItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        sprint_id:
          type: string
          format: uuid
          nullable: true
        title:
          type: string
        description:
          type: string
        acceptance_criteria:
          type: array
          items:
            type: string
        priority:
          type: string
          enum: [critical, high, medium, low]
        story_points:
          type: integer
          nullable: true
        status:
          type: string
          enum: [backlog, in_sprint, in_progress, done]
        requirement_id:
          type: string
          format: uuid
          nullable: true
        ai_generated:
          type: boolean

    CreateBacklogItemRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
        description:
          type: string
        acceptance_criteria:
          type: array
          items:
            type: string
        priority:
          type: string
          enum: [critical, high, medium, low]
          default: medium
        story_points:
          type: integer
        requirement_id:
          type: string
          format: uuid

    UpdateBacklogItemRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        priority:
          type: string
        story_points:
          type: integer
        status:
          type: string
        sprint_id:
          type: string
          format: uuid

    Sprint:
      type: object
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        name:
          type: string
        goal:
          type: string
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        capacity_points:
          type: integer
        status:
          type: string
          enum: [planned, active, completed]

    SprintDetail:
      allOf:
        - $ref: '#/components/schemas/Sprint'
        - type: object
          properties:
            backlog_items:
              type: array
              items:
                $ref: '#/components/schemas/BacklogItem'
            velocity:
              type: number
              nullable: true

    CreateSprintRequest:
      type: object
      required: [name, start_date, end_date]
      properties:
        name:
          type: string
        goal:
          type: string
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        capacity_points:
          type: integer

    UpdateSprintRequest:
      type: object
      properties:
        name:
          type: string
        goal:
          type: string
        status:
          type: string
        capacity_points:
          type: integer

    SprintPlanRecommendation:
      type: object
      properties:
        recommended_items:
          type: array
          items:
            $ref: '#/components/schemas/BacklogItem'
        total_points:
          type: integer
        confidence_score:
          type: number
        rationale:
          type: string

    EstimationResult:
      type: object
      properties:
        item_id:
          type: string
          format: uuid
        estimated_points:
          type: integer
        confidence:
          type: number
        rationale:
          type: string

    TraceabilityEntry:
      type: object
      properties:
        requirement_id:
          type: string
          format: uuid
        requirement_title:
          type: string
        backlog_item_ids:
          type: array
          items:
            type: string
            format: uuid
        ai_job_ids:
          type: array
          items:
            type: string
            format: uuid
        code_artifact_urls:
          type: array
          items:
            type: string
        test_case_ids:
          type: array
          items:
            type: string
            format: uuid
        deployment_ids:
          type: array
          items:
            type: string
            format: uuid

    AIJobReference:
      type: object
      properties:
        job_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [queued, running, completed, failed]
        estimated_duration_seconds:
          type: integer
