openapi: "3.1.0"
info:
  title: Auth Service API
  description: |
    User management, RBAC, SSO/MFA, and session management for the Xccelera platform.
    All other services validate tokens by calling this service's /auth/validate endpoint.
  version: "1.0.0"
  contact:
    name: Xccelera Platform Team
    email: dev@xccelera.ai

servers:
  - url: http://localhost:8001/api/v1
    description: Local development

tags:
  - name: auth
    description: Authentication flows
  - name: users
    description: User management
  - name: roles
    description: Role & permission management
  - name: me
    description: Current user profile

paths:

  /auth/login:
    post:
      tags: [auth]
      summary: Authenticate user and issue JWT tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        "200":
          description: Tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        "401":
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      tags: [auth]
      summary: Invalidate refresh token
      security:
        - BearerAuth: []
      responses:
        "204":
          description: Logged out

  /auth/refresh:
    post:
      tags: [auth]
      summary: Exchange refresh token for new access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        "200":
          description: New access token issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        "401":
          $ref: '#/components/responses/Unauthorized'

  /auth/mfa/enroll:
    post:
      tags: [auth]
      summary: Initiate TOTP/FIDO2 MFA enrollment
      security:
        - BearerAuth: []
      responses:
        "200":
          description: MFA enrollment data (TOTP QR code URI or FIDO2 challenge)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MFAEnrollResponse'

  /auth/mfa/verify:
    post:
      tags: [auth]
      summary: Verify MFA code during login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [session_token, code]
              properties:
                session_token:
                  type: string
                code:
                  type: string
      responses:
        "200":
          description: MFA verified — full JWT tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        "401":
          $ref: '#/components/responses/Unauthorized'

  /auth/validate:
    post:
      tags: [auth]
      summary: Validate an access token (used by other services internally)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        "200":
          description: Token claims
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenClaims'
        "401":
          $ref: '#/components/responses/Unauthorized'

  /auth/sso/callback:
    get:
      tags: [auth]
      summary: OAuth 2.0 / SAML SSO callback
      parameters:
        - in: query
          name: code
          schema:
            type: string
        - in: query
          name: state
          schema:
            type: string
      responses:
        "302":
          description: Redirect to frontend with tokens

  /users:
    get:
      tags: [users]
      summary: List all users in the tenant
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - in: query
          name: role
          schema:
            type: string
      responses:
        "200":
          description: Paginated list of users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
    post:
      tags: [users]
      summary: Create a new user (admin only)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  /users/{user_id}:
    get:
      tags: [users]
      summary: Get user by ID
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        "200":
          description: User details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        "404":
          $ref: '#/components/responses/NotFound'
    put:
      tags: [users]
      summary: Update user
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
    delete:
      tags: [users]
      summary: Deactivate user (soft delete)
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        "204":
          description: User deactivated

  /users/{user_id}/roles:
    post:
      tags: [users]
      summary: Assign role to user
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role_id]
              properties:
                role_id:
                  type: string
                  format: uuid
      responses:
        "200":
          description: Role assigned

  /roles:
    get:
      tags: [roles]
      summary: List all roles
      security:
        - BearerAuth: []
      responses:
        "200":
          description: List of roles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Role'
    post:
      tags: [roles]
      summary: Create custom role (admin only)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoleRequest'
      responses:
        "201":
          description: Role created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Role'

  /roles/{role_id}:
    get:
      tags: [roles]
      summary: Get role details with permissions
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RoleId'
      responses:
        "200":
          description: Role details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Role'

  /me:
    get:
      tags: [me]
      summary: Get current user profile
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
    put:
      tags: [me]
      summary: Update current user profile
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    UserId:
      name: user_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RoleId:
      name: role_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Page:
      name: page
      in: query
      schema:
        type: integer
        default: 1
    PageSize:
      name: page_size
      in: query
      schema:
        type: integer
        default: 20
        maximum: 100

  responses:
    Unauthorized:
      description: Authentication required or token invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
          default: bearer
        expires_in:
          type: integer
          description: Seconds until access token expires (900 = 15 min)
        requires_mfa:
          type: boolean
        mfa_session_token:
          type: string
          nullable: true

    TokenClaims:
      type: object
      properties:
        sub:
          type: string
          format: uuid
        email:
          type: string
        tenant_id:
          type: string
          format: uuid
        roles:
          type: array
          items:
            type: string
        permissions:
          type: array
          items:
            type: string
        exp:
          type: integer

    MFAEnrollResponse:
      type: object
      properties:
        method:
          type: string
          enum: [totp, fido2]
        totp_uri:
          type: string
          nullable: true
        fido2_challenge:
          type: object
          nullable: true

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        full_name:
          type: string
        role:
          type: string
        tenant_id:
          type: string
          format: uuid
        is_active:
          type: boolean
        mfa_enabled:
          type: boolean
        created_at:
          type: string
          format: date-time

    CreateUserRequest:
      type: object
      required: [email, full_name, role]
      properties:
        email:
          type: string
          format: email
        full_name:
          type: string
        role:
          type: string
          enum: [project_manager, developer, qa_engineer, devops_engineer, business_stakeholder, system_admin]
        send_invite:
          type: boolean
          default: true

    UpdateUserRequest:
      type: object
      properties:
        full_name:
          type: string
        role:
          type: string

    Role:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        permissions:
          type: array
          items:
            type: string

    CreateRoleRequest:
      type: object
      required: [name, permissions]
      properties:
        name:
          type: string
        description:
          type: string
        permissions:
          type: array
          items:
            type: string

    UserListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/User'
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        detail:
          type: string
