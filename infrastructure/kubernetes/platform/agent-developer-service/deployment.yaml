apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-developer-service
  namespace: platform
  labels:
    app: agent-developer-service
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agent-developer-service
  template:
    metadata:
      labels:
        app: agent-developer-service
    spec:
      containers:
        - name: agent-developer-service
          image: xccelera/agent-developer-service:latest
          ports:
            - containerPort: 8011
          envFrom:
            - secretRef:
                name: agent-developer-service-secrets
            - configMapRef:
                name: platform-config
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8011
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8011
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: agent-developer-service
  namespace: platform
spec:
  selector:
    app: agent-developer-service
  ports:
    - port: 8011
      targetPort: 8011
      protocol: TCP
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: agent-developer-service-hpa
  namespace: platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: agent-developer-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
